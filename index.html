<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carros</title>
  <style>
    /* Reset e fonte */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
    }

    /* Header e Menu */
    header {
      background-color: #333;
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    nav ul {
      list-style: none;
      margin-top: 10px;
      padding: 0;
    }

    nav li {
      display: inline-block;
      margin-right: 20px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #ffcc00;
      text-decoration: underline;
    }

    /* Seções */
    section {
      padding: 20px;
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    section.mostrar {
      display: block;
      opacity: 1;
    }

    /* Tabela de preços */
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 600px;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #333;
      color: #fff;
    }

    /* Formulário */
    input, textarea, button {
      width: 100%;
      max-width: 400px;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      background-color: #333;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #555;
    }

  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Carros</h1>
    <nav>
      <ul>
        <li><a onclick="mostrarPagina('home')">Home</a></li>
        <li><a onclick="mostrarPagina('carros')">Carros</a></li>
        <li><a onclick="mostrarPagina('contato')">Contato</a></li>
      </ul>
    </nav>
  </header>

  <!-- PÁGINA HOME -->
  <section id="home" class="mostrar">
    <h2>Bem-vindo ao site de carros</h2>
    <p>Aqui você encontra informações, fotos, vídeos e muito mais sobre carros.</p>
  </section>

  <!-- PÁGINA CARROS -->
  <section id="carros">
    <h2>Modelos de Carros</h2>
    <img src="https://via.placeholder.com/400x200" alt="Carro exemplo">

    <h3>Vídeo do Carro</h3>
    <video width="400" controls>
      <source src="video.mp4" type="video/mp4">
      Seu navegador não suporta vídeos.
    </video>

    <h3>Áudio do Motor</h3>
    <audio controls>
      <source src="motor.mp3" type="audio/mpeg">
      Seu navegador não suporta áudios.
    </audio>

    <h3>Tabela de Preços</h3>
    <table>
      <tr>
        <th>Modelo</th>
        <th>Preço</th>
      </tr>
      <tr>
        <td>Carro A</td>
        <td>$20.000</td>
      </tr>
      <tr>
        <td>Carro B</td>
        <td>$30.000</td>
      </tr>
    </table>
  </section>

  <!-- PÁGINA CONTATO -->
  <section id="contato">
    <h2>Contato</h2>
    <form>
      <label>Nome:</label><br>
      <input type="text" name="nome" placeholder="Seu nome"><br>

      <label>Email:</label><br>
      <input type="email" name="email" placeholder="Seu email"><br>

      <label>Mensagem:</label><br>
      <textarea name="mensagem" placeholder="Sua mensagem"></textarea><br>

      <button type="submit">Enviar</button>
    </form>
  </section>

  <!-- SCRIPT DE TROCA DE PÁGINA -->
  <script>
    function mostrarPagina(pagina) {
      const secoes = document.querySelectorAll("section");
      secoes.forEach(sec => sec.classList.remove("mostrar"));

      document.getElementById(pagina).classList.add("mostrar");
    }
  </script>

</body>
</html>
